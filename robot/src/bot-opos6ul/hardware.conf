# ============================================
# Configuration hardware OPOS6UL
#
# Chaque driver peut etre active (1) ou desactive (0).
# Si ce fichier est absent, tous les drivers sont actives par defaut.
# Ce fichier doit etre copie a cote de l'executable.
# ============================================

# Asservissement moteurs (liaison serie vers carte asserv)
# AsservDriver = 1 active le protocole ASCII (SerialIO)
# AsservCborDriver = 1 active le protocole CBOR (SerialCbor) — nécessite SerialCbor côté Nucleo
AsservDriver = 0
AsservCborDriver = 1

# Capteurs de detection d'obstacles (IR, US, etc.)
SensorsDriver = 1

# LEDs de la barre de LEDs
LedDriver = 1

# Interrupteurs / switchs (tirette, boutons couleur)
SwitchDriver = 1

# Ecran LCD 2x16
LcdShieldDriver = 1

# Boutons poussoirs
ButtonDriver = 1

# Capteur couleur Grove (I2C)
ColorDriver = 0

# Servomoteurs (AX12, etc.)
ServoDriver = 1
